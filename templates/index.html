<!DOCTYPE html>
<html>
<head>
<title>Public Notes</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
<h1>🌍 Public Notes Board</h1>

<form method="POST">
<input type="text" name="note" placeholder="Write something..." required>
<button type="submit">Post</button>
</form>

<div class="notes">
{% for note in notes %}
  <div class="note">
    {{ note.content }}
  </div>
{% endfor %}
</div>

</body>
</html>
